<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" font-family="system-ui, sans-serif">
  <rect width="420" height="220" fill="#f5f7fa"/>
  <text x="210" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#2c3e50">A local SVG image</text>
  <!-- bars -->
  <rect x="70"  y="120" width="60" height="70"  fill="#2780e3"/>
  <rect x="180" y="80"  width="60" height="110" fill="#3fb618"/>
  <rect x="290" y="60"  width="60" height="130" fill="#e83e8c"/>
  <!-- baseline -->
  <line x1="40" y1="190" x2="390" y2="190" stroke="#7f8c8d" stroke-width="1.5"/>
  <!-- labels -->
  <text x="100" y="208" text-anchor="middle" font-size="12" fill="#34495e">one</text>
  <text x="210" y="208" text-anchor="middle" font-size="12" fill="#34495e">two</text>
  <text x="320" y="208" text-anchor="middle" font-size="12" fill="#34495e">three</text>
</svg>
