project:
  type: website
  output-dir: _site
  # The research tool is a standalone static page (not a .qmd); copy it verbatim
  # into the site so the post's link to research/ resolves.
  resources:
    - "posts/jeopardy_ds/research/**"
  # Render every .qmd page; exclude committed data/notes artifacts that live
  # under posts/ but must not become web pages.
  render:
    - "*.qmd"
    - "posts/**/*.qmd"
    - "!posts/jeopardy_ds/cluster_naming_prompt.md"
    - "!posts/jeopardy_ds/notes/"
    - "!posts/montreal_events/notes/"

website:
  title: "Nicholas Tacik"
  description: "Notes on building with AI, experiments, and the occasional Kaggle competition."
  site-url: https://nicholastacik.github.io
  # Drafts (draft: true) render and are reachable by URL, but stay out of
  # listings, nav, and search until promoted.
  draft-mode: unlinked
  navbar:
    pinned: true
    right:
      - text: Home
        href: index.qmd
      - text: About
        href: about.qmd
      - icon: github
        href: https://github.com/nicholastacik
        aria-label: GitHub
  page-footer:
    center: "© 2026 Nicholas Tacik · Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
